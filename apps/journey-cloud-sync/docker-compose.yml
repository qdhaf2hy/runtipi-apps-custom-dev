version: '3.9'
services:
  journey-sync:
    container_name: journey-sync
    image: journeycloud/journey-sync-self-hosted:0.1.0-alpha04
    restart: unless-stopped
    ports:
      - ${APP_PORT}:8080
    environment:
      EXPRESS_SERVER_PORT: 8080
      REDIS_PORT: 6379
      DISABLE_SSL: NO
      DOMAIN: ${APP_DOMAIN}
      ROOT_MONGO_DB_URL: mongodb://root:password@journey-mongodb-service:27017
      MONGO_DB_URL: mongodb://user:password@journey-mongodb-service:27017/journey
      REDIS_URL: redis://journey-redis-service:6379
      FS_PATH: /mnt/data
      SIGNED: ${SIGNED_SECRET}
      ADMIN_JS_COOKIE_PASSWORD: ${ADMIN_JS_COOKIE_PASSWORD}
      TYPESENSE_HOST: journey-typesense-service
      TYPESENSE_PORT: 8108
      TYPESENSE_PROTOCOL: http
      TYPESENSE_API_KEY: ${TYPESENSE_API_KEY}
    entrypoint: 'npm run launch'
    depends_on:
      - journey-mongodb-service
      - journey-redis-service
      - journey-typesense-service
    volumes:
      - journey-fs-volume:/mnt/data
    networks:
      - tipi_main_network
    labels:
      traefik.enable: true
      traefik.http.middlewares.journey-web-redirect.redirectscheme.scheme: https
      traefik.http.services.journey.loadbalancer.server.port: 8080
      traefik.http.routers.journey-insecure.rule: Host(`${APP_DOMAIN}`)
      traefik.http.routers.journey-insecure.entrypoints: web
      traefik.http.routers.journey-insecure.service: journey
      traefik.http.routers.journey-insecure.middlewares: journey-web-redirect
      traefik.http.routers.journey.rule: Host(`${APP_DOMAIN}`)
      traefik.http.routers.journey.entrypoints: websecure
      traefik.http.routers.journey.service: journey
      traefik.http.routers.journey.tls.certresolver: myresolver
      runtipi.managed: true

  journey-sync-self-hosted-media:
    container_name: journey-sync-self-hosted-media
    image: journeycloud/journey-sync-self-hosted
    restart: unless-stopped
    environment:
      REDIS_PORT: 6379
      DISABLE_SSL: NO
      DOMAIN: ${APP_DOMAIN}
      ROOT_MONGO_DB_URL: mongodb://root:password@journey-mongodb-service:27017
      MONGO_DB_URL: mongodb://user:password@journey-mongodb-service:27017/journey
      REDIS_URL: redis://journey-redis-service:6379
      FS_PATH: /mnt/data
    entrypoint: 'npm run launchMedia'
    depends_on:
      - journey-sync
    volumes:
      - journey-fs-volume:/mnt/data
    networks:
      - tipi_main_network

  journey-mongodb-service:
    container_name: journey-mongodb-service
    image: mongo:7.0
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: root
      MONGO_INITDB_ROOT_PASSWORD: password
      MONGO_INITDB_DATABASE: journey
    volumes:
      - journey-mongodb-volume:/data/db
    networks:
      - tipi_main_network

  journey-redis-service:
    container_name: journey-redis-service
    image: redis:7.2.4-alpine
    restart: unless-stopped
    command: redis-server
    volumes:
      - journey-redis-volume:/data
    networks:
      - tipi_main_network

  journey-typesense-service:
    container_name: journey-typesense-service
    image: typesense/typesense:26.0
    restart: unless-stopped
    command: '--data-dir /data --api-key=${TYPESENSE_API_KEY} --enable-cors'
    volumes:
      - journey-typesense-volume:/data
    networks:
      - tipi_main_network

volumes:
  journey-mongodb-volume:
    labels:
      kompose.volume.size: 10Gi
  journey-typesense-volume:
    labels:
      kompose.volume.size: 10Gi
  journey-fs-volume:
    labels:
      kompose.volume.size: 20Gi
  journey-redis-volume:
    labels:
      kompose.volume.size: 4Gi

networks:
  tipi_main_network:
    external: true
